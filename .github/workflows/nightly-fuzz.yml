name: Nightly Fuzz

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz_osc_parser, fuzz_ports_parser, fuzz_git_parser, fuzz_ipc_framing, fuzz_session_deser]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Run fuzzer (${{ matrix.target }})
        run: cd src-tauri/fuzz && cargo fuzz run ${{ matrix.target }} -- -max_total_time=300
      - name: Upload corpus on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus-${{ matrix.target }}
          path: src-tauri/fuzz/corpus/
          retention-days: 14
