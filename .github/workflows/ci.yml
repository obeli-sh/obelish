name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: lint-ubuntu
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Security audit
        run: cargo audit

  rust-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            deps: |
              sudo apt-get update
              sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
          - os: macos-latest
            deps: ""
          - os: windows-latest
            deps: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}
      - name: Install system dependencies
        if: matrix.deps != ''
        run: ${{ matrix.deps }}
        shell: bash
      - name: Run tests
        run: cargo test --workspace
        env:
          RUST_BACKTRACE: 1
      - name: Security audit
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cargo-audit
          cargo audit
      - name: Rust code coverage
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cargo-tarpaulin
          cargo tarpaulin --workspace --out xml --output-dir coverage/ --fail-under 70
      - name: Upload Rust coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: coverage/
          retention-days: 14
      - name: Upload Rust coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage/cobertura.xml
          flags: rust
          fail_ci_if_error: false

  frontend-check:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.2"
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Install dependencies
        run: bun install
      - name: Security audit (npm)
        run: bun x audit-ci --moderate
        continue-on-error: false
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Test with coverage
        run: bun run test:coverage
      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
      - name: Upload frontend coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  # NOTE: E2E tests are disabled until we have a way to run them
  # against the built Tauri app. Currently they timeout because
  # there is no backend serving Tauri commands.
  # e2e:
  #   runs-on: ubuntu-latest
  #   needs: [frontend-check]
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: oven-sh/setup-bun@v2
  #       with:
  #         bun-version: "1.2.2"
  #     - name: Install Playwright browsers
  #       run: npx playwright install --with-deps chromium firefox
  #     - name: Run Playwright E2E tests
  #       run: npx playwright test
  #       env:
  #         CI: true

  rust-mutation:
    runs-on: ubuntu-latest
    needs: [rust-test]
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: mutation-ubuntu
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
      - name: Install cargo-mutants
        run: cargo install cargo-mutants
      - name: Run mutation testing
        run: cargo mutants --no-shuffle --timeout 120
      - name: Extract mutation score
        if: always()
        run: |
          if [ -f mutants.out/caught.txt ] && [ -f mutants.out/missed.txt ]; then
            caught=$(wc -l < mutants.out/caught.txt)
            missed=$(wc -l < mutants.out/missed.txt)
            total=$((caught + missed))
            if [ $total -gt 0 ]; then
              score=$((caught * 100 / total))
              echo "Mutation score: ${score}% (${caught}/${total})"
              echo "MUTATION_SCORE=${score}" >> $GITHUB_ENV
            fi
          fi
      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: mutants.out/
          retention-days: 14

  build:
    runs-on: ubuntu-latest
    needs: [rust-lint, rust-test, frontend-check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: build-ubuntu
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.2"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev
      - name: Install frontend dependencies
        run: bun install
      - name: Build
        run: bun tauri build
      - name: Smoke test (binary exists)
        run: |
          ls -la target/release/bundle/ || echo "Bundle directory listing"
          test -d target/release/bundle/ && echo "Build artifacts verified"
