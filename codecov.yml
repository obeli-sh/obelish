codecov:
  require_ci_to_pass: true
coverage:
  precision: 2
  round: down
  range: "60...90"
  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: 80%
comment:
  layout: "reach,diff,flags"
  behavior: default
flags:
  rust:
    paths:
      - src-tauri/
    carryforward: true
  frontend:
    paths:
      - src/
    carryforward: true
